version: "3"

services:

  airflow:
    image: apache/airflow:2.7.0
    container_name: airflow

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./scripts_db:/opt/airflow/scripts_db

    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create \
        --username admin \
        --password admin \
        --firstname admin \
        --lastname admin \
        --role Admin \
        --email admin@example.com || true &&
      sqlite3 /opt/airflow/data/dwh.db < /opt/airflow/scripts_db/init.sql &&
      airflow scheduler & 
      airflow webserver
      "